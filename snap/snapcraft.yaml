name: confined-shell
adopt-info: miriway
summary: A minimal Mir based confined shell for testing support for such things
description: A minimal Mir based confined shell for testing support for such things
confinement: strict
grade: devel
base: core22

environment:
  SHELL: bash
  LC_ALL: C.UTF-8
  PATH: $SNAP/usr/local/bin/:$SNAP/bin:$SNAP/usr/bin:$PATH
  # XDG config
  XDG_DATA_DIRS:   $SNAP/usr/share
  XDG_CONFIG_DIRS: $SNAP/etc/xdg
  XDG_CACHE_HOME:  $SNAP_USER_COMMON/.cache
  XDG_CONFIG_HOME: $SNAP_USER_DATA/.config
  # Prep for Mir
  MIR_SERVER_PLATFORM_PATH: ${SNAP}/usr/lib/${SNAPCRAFT_ARCH_TRIPLET}/mir/server-platform
  # graphics
  LD_LIBRARY_PATH: /var/lib/snapd/lib/gl:/var/lib/snapd/lib/gl32:/var/lib/snapd/void:$SNAP/graphics/lib:$SNAP/usr/lib:$SNAP/usr/lib/${SNAPCRAFT_ARCH_TRIPLET}
  LIBGL_DRIVERS_PATH:        $SNAP/graphics/dri
  LIBVA_DRIVERS_PATH:        $SNAP/graphics/dri
  __EGL_VENDOR_LIBRARY_DIRS: $SNAP/graphics/glvnd/egl_vendor.d

layout:
  /usr/share/X11:
    bind: $SNAP/usr/share/X11
  /etc/fonts:
    bind: $SNAP/etc/fonts
  /usr/share/fonts:
    bind: $SNAP/usr/share/fonts
  /usr/bin/xkbcomp:
    symlink: $SNAP/usr/bin/xkbcomp
  /usr/share/icons:
    bind: $SNAP/usr/share/icons
  /usr/lib/$CRAFT_ARCH_TRIPLET/gdk-pixbuf-2.0:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/gdk-pixbuf-2.0
  /usr/share/libdrm:  # Needed by mesa-core20 on AMD GPUs
    bind: $SNAP/graphics/libdrm
  /usr/share/drirc.d:  # Used by mesa-core20 for app specific workarounds
    bind: $SNAP/graphics/drirc.d
  /etc/gtk-3.0:
    bind: $SNAP/etc/gtk-3.0

apps:
  confined-shell:
    command-chain:
      - bin/run-shell
    command: usr/local/bin/miriway
    desktop: usr/share/wayland-sessions/confined-shell.desktop
    slots:
      - wayland
    plugs:
      - login-session-control
      - x11
    environment:
      XDG_DATA_DIRS: $SNAP/usr/share:/var/lib/snapd/desktop

parts:
  recipe-version:
    plugin: nil
    source: .
    source-type: git
    override-pull: |
      craftctl default
      echo $CRAFT_STAGE/recipe-version
      git rev-list --count HEAD > $CRAFT_STAGE/recipe-version
    prime:
      - -recipe-version

  miriway:
    after: [recipe-version]
    source: https://github.com/Miriway/Miriway.git
    override-pull: |
      craftctl default
      server_version=`git rev-list --count HEAD`
      mir_version=`LANG=C apt-cache policy mir-graphics-drivers-desktop | sed -rne 's/^\s+Candidate:\s+([^-]*)-.+$/\1/p'`
      recipe_version=`cat $CRAFT_STAGE/recipe-version`
      craftctl set version=$server_version-mir$mir_version-snap$recipe_version
#      if echo $mir_version | grep -e '+dev' -e '~rc' -q; then craftctl set grade devel; else craftctl set-grade stable; fi
    plugin: cmake
    build-packages:
      - build-essential
      - pkg-config
      - libmiral-dev
      - g++
    stage-packages:
      - libmiral5
      - mir-graphics-drivers-desktop
    stage:
      - -usr/share/wayland-sessions/miriway.desktop

  wofi:
    plugin: nil
    stage-packages:
      - wofi

  swaybg:
    plugin: nil
    stage-packages:
      - swaybg
      - ubuntu-wallpapers

  icons:
    plugin: nil
    stage-packages: [dmz-cursor-theme]

  glue:
    plugin: dump
    source: glue

  env:
    plugin: cmake
    source: env

  misc:
    plugin: nil
    stage-packages:
    - libxcb1
    - libpulse0
    - libsndfile1
    - libasyncns0
    - liblua5.2-0
    - libslang2
    - libglu1-mesa
    - libgpm2
    - libgtk3-nocsd0
    - libgdk-pixbuf2.0-bin # GDK pixbuf
    - libglib2.0-0
    build-packages:
      - libglib2.0-0
      - libgdk-pixbuf2.0-0
      - librsvg2-dev # So the libpixbufloader-svg.so loader can be loaded by gdk-pixbuf-query-loaders
    override-build: |
      craftctl default
      update-mime-database $CRAFT_PART_INSTALL/usr/share/mime
    override-prime: |
      craftctl default
      # Compile the gsettings schemas
      /usr/lib/${SNAPCRAFT_ARCH_TRIPLET}/glib-2.0/glib-compile-schemas "$CRAFT_PRIME/usr/share/glib-2.0/schemas"
      # Index the pixbuf loaders
      GDK_PIXBUF_MODULEDIR=$CRAFT_PRIME/usr/lib/${SNAPCRAFT_ARCH_TRIPLET}/gdk-pixbuf-2.0/2.10.0/loaders \
      "/usr/lib/$CRAFT_ARCH_TRIPLET/gdk-pixbuf-2.0/gdk-pixbuf-query-loaders" > "$CRAFT_PRIME/usr/lib/$CRAFT_ARCH_TRIPLET/gdk-pixbuf-2.0/2.10.0/loaders.cache"
      sed s!$CRAFT_PRIME!!g --in-place "$CRAFT_PRIME/usr/lib/$CRAFT_ARCH_TRIPLET/gdk-pixbuf-2.0/2.10.0/loaders.cache"

  mesa-core22:
    plugin: nil
    stage-packages:
      - libgl1-mesa-dri
      - va-driver-all
      - libegl1
      - libgles2
    organize:
      'usr/lib/${CRAFT_ARCH_TRIPLET}/dri/*': graphics/dri/
      'usr/lib/${CRAFT_ARCH_TRIPLET}/*.so*': graphics/lib/
      'usr/share/glvnd': graphics/glvnd/
      'usr/share/libdrm': graphics/libdrm/
      'usr/share/drirc.d/': graphics/drirc.d/
    prime:
      - graphics/lib
      - graphics/dri
      - graphics/glvnd
      - graphics/libdrm
      - graphics/drirc.d

plugs:
  desktop-launch:
  opengl:
  network-bind:

slots:
  wayland:

architectures:
  - build-on: amd64
  - build-on: arm64
  - build-on: armhf

package-repositories:
  - type: apt
    ppa: mir-team/release
